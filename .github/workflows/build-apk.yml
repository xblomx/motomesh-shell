# Moto Mesh Shell · CI v2 · proven wrapper flow + rolling public release
name: build-apk
on: { push: { branches: [ main ] }, workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
      - run: gradle wrapper --gradle-version 8.7
      - run: ./gradlew assembleDebug
      - run: cp app/build/outputs/apk/debug/app-debug.apk motomesh-shell.apk
      - uses: actions/upload-artifact@v4
        with: { name: MotoMeshShell-debug-apk, path: motomesh-shell.apk }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: shell-latest
          name: Moto Mesh Shell (latest)
          make_latest: true
          files: motomesh-shell.apk
