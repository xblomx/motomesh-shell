# Moto Mesh Shell · CI v3.1 · permanent-key release signing + rolling public release
name: build-apk
on: { push: { branches: [ main ] }, workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      KS_PATH: /home/runner/motomesh-release.jks
      KS_PW: ${{ secrets.KEYSTORE_PW }}
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > $KS_PATH
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
      - run: gradle wrapper --gradle-version 8.7
      - run: ./gradlew assembleRelease
      - run: cp app/build/outputs/apk/release/app-release.apk motomesh-shell.apk
      - uses: actions/upload-artifact@v4
        with: { name: MotoMeshShell-apk, path: motomesh-shell.apk }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: shell-latest
          name: Moto Mesh Shell (latest)
          make_latest: true
          files: motomesh-shell.apk
