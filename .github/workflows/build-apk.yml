# Moto Mesh Shell · CI v4.3 · dual-flavor: sideload APK (self-update) + Play AAB (no self-update, no REQUEST_INSTALL_PACKAGES) · auto-versioned, permanently signed, dual-release
name: build-apk
on: { push: { branches: [ main ] }, workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      KS_PATH: /home/runner/motomesh-release.jks
      KS_PW: ${{ secrets.KEYSTORE_PW }}
      VC: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - run: echo "VN=$(cat VERSION)" >> $GITHUB_ENV
      - run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > $KS_PATH
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
      - run: gradle wrapper --gradle-version 8.7
      - run: ./gradlew assembleSideloadRelease
      - run: ./gradlew bundlePlayRelease
      - run: cp app/build/outputs/apk/sideload/release/app-sideload-release.apk "motomesh-shell_v${VN}-b${VC}.apk"
      - run: cp app/build/outputs/bundle/playRelease/app-play-release.aab "motomesh-shell-play_v${VN}-b${VC}.aab"
      - uses: actions/upload-artifact@v4
        with: { name: MotoMeshShell-apk, path: motomesh-shell_v*.apk }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: shell-latest
          name: Moto Mesh Shell (latest)
          make_latest: true
          files: |
            motomesh-shell_v*.apk
            motomesh-shell-play_v*.aab
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: shell-v${{ env.VN }}-b${{ github.run_number }}
          name: Moto Mesh Shell v${{ env.VN }} (build ${{ github.run_number }})
          make_latest: false
          files: |
            motomesh-shell_v*.apk
            motomesh-shell-play_v*.aab
